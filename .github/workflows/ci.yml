name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/Books.WebAPI/Books.WebAPI.csproj

      - name: Build
        run: dotnet build backend/Books.WebAPI/Books.WebAPI.csproj --no-restore --configuration Release

      - name: Run tests (if exist)
        run: |
          if [ -d "backend/Books.WebAPI.Tests" ]; then
            dotnet test backend/Books.WebAPI.Tests/Books.WebAPI.Tests.csproj --no-build --verbosity normal --configuration Release;
          else
            echo "No test project found, skipping tests";
          fi
        shell: bash
